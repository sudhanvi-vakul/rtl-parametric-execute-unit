smoke:
  - name: exec_unit
    description: "Default 32-bit execute unit regression with multiply enabled"
    top: exec_unit_tb
    rtl:
      - rtl/exec_defs_pkg.sv
      - rtl/alu_core.sv
      - rtl/shifter_core.sv
      - rtl/cmp_branch_core.sv
      - rtl/mul_core.sv
      - rtl/exec_unit.sv
    tb:
      - tb/exec_unit_testbench.sv
      - tb/exec_unit_tb.sv

  - name: exec_unit_nomul
    description: "32-bit execute unit regression with multiply disabled"
    top: exec_unit_nomul_tb
    rtl:
      - rtl/exec_defs_pkg.sv
      - rtl/alu_core.sv
      - rtl/shifter_core.sv
      - rtl/cmp_branch_core.sv
      - rtl/mul_core.sv
      - rtl/exec_unit.sv
    tb:
      - tb/exec_unit_testbench.sv
      - tb/exec_unit_nomul_tb.sv

