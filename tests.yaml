    top: exec_unit_8b_tb
    rtl:
      - rtl/exec_defs_pkg.sv
      - rtl/alu_core.sv
      - rtl/shifter_core.sv
      - rtl/cmp_branch_core.sv
      - rtl/mul_core.sv
      - rtl/exec_unit.sv
    tb:
      - tb/exec_unit_testbench.sv
      - tb/exec_unit_8b_tb.sv

  - name: exec_unit_16b
